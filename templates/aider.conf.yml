# Anvil — aider configuration
# This file is written by install.sh. Edit to change defaults.
# See: https://aider.chat/docs/config.html

model: __MODEL__
openai-api-base: __API_BASE__
openai-api-key: __API_KEY__

auto-lint: true
lint-cmd:
  - "python: anvil-review"
  - "javascript: anvil-review"
  - "typescript: anvil-review"

no-analytics: true
no-show-model-warnings: true
no-show-release-notes: true
no-check-update: true
yes-always: true

# Auto-test — runs after each edit, before Claude review
# Enable for simple projects. Disable for projects with external deps.
# auto-test: true
# test-cmd: "python -m pytest -x -q"

map-tokens: 1024
